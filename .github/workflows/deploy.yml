name: Deploy to Production

on:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: crm-service
  # crm-service runs inside the unified cccrm stack (managed by crm-gateway repo).
  # CI only updates the service image — it does NOT redeploy the entire stack.
  SERVICE_NAME: cccrm_crm-service

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: mvn package -DskipTests -q

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ secrets.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy & Verify
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy and verify rollout
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            REGISTRY="${{ secrets.REGISTRY }}/${{ github.repository_owner }}"
            IMAGE_TAG="${{ github.sha }}"
            SERVICE="${{ env.SERVICE_NAME }}"
            NEW_IMAGE="$REGISTRY/${{ env.IMAGE_NAME }}:$IMAGE_TAG"

            echo "==> Logging in to registry on server"
            echo "${{ secrets.CR_PAT }}" | docker login ${{ secrets.REGISTRY }} \
              -u ${{ github.actor }} --password-stdin

            echo "==> Updating service $SERVICE to image: $NEW_IMAGE"
            docker service update \
              --image "$NEW_IMAGE" \
              --with-registry-auth \
              "$SERVICE"

            echo "==> Monitoring rollout (max 5 min)..."
            MAX_WAIT=300
            INTERVAL=15
            ELAPSED=0

            while [ "$ELAPSED" -lt "$MAX_WAIT" ]; do
              # head -1 prevents multi-line output if filter matches multiple services
              REPLICAS=$(docker service ls --filter "name=$SERVICE" --format "{{.Replicas}}" 2>/dev/null | head -1)
              REPLICAS="${REPLICAS:-0/0}"
              RUNNING=$(echo "$REPLICAS" | cut -d'/' -f1 | tr -d '[:space:]')
              DESIRED=$(echo "$REPLICAS" | cut -d'/' -f2 | tr -d '[:space:]')

              set +o pipefail
              TASK_STATES=$(docker service ps "$SERVICE" --no-trunc \
                --format "{{.Image}} {{.CurrentState}}" 2>/dev/null || true)
              FAILED=$(echo "$TASK_STATES" | grep -F "$IMAGE_TAG" | grep -cE "Failed|Rejected" 2>/dev/null || echo "0")
              FAILED=$(echo "$FAILED" | head -1 | tr -d '[:space:]')
              FAILED="${FAILED:-0}"
              set -o pipefail

              echo "  [${ELAPSED}s] Replicas: $REPLICAS | Failed new tasks: $FAILED"

              if [ "$FAILED" -gt 0 ]; then
                echo "==> ERROR: new image failed — rolling back"
                docker service rollback "$SERVICE" || true
                exit 1
              fi

              if [ -n "$DESIRED" ] && [ "$DESIRED" -gt 0 ] && [ "$RUNNING" = "$DESIRED" ]; then
                SPEC_IMAGE=$(docker service inspect "$SERVICE" \
                  --format '{{.Spec.TaskTemplate.ContainerSpec.Image}}' 2>/dev/null || echo "")
                if echo "$SPEC_IMAGE" | grep -q "$IMAGE_TAG"; then
                  echo "==> Deployment successful: all $DESIRED replica(s) running"
                  exit 0
                fi
              fi

              sleep "$INTERVAL"
              ELAPSED=$((ELAPSED + INTERVAL))
            done

            echo "==> ERROR: timeout after ${MAX_WAIT}s — rolling back"
            docker service rollback "$SERVICE" || true
            exit 1
