# Docker Swarm stack
# Deploy: docker stack deploy -c docker-stack.yml crm --with-registry-auth
# Secrets must be created before deploy:
#   echo "secret_value" | docker secret create db_password -
#   echo "secret_value" | docker secret create jwt_secret -

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    secrets:
      - db_password
    networks:
      - crm-network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  crm-service:
    image: ${REGISTRY}/crm-service:${IMAGE_TAG:-latest}
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD_FILE: /run/secrets/db_password
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      SERVER_PORT: "8080"
    secrets:
      - db_password
      - jwt_secret
    networks:
      - crm-network
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: rolling-update
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 5s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  crm-network:
    driver: overlay
    attachable: true

volumes:
  postgres_data:
    driver: local

secrets:
  db_password:
    external: true
  jwt_secret:
    external: true
